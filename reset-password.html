<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - ToolGrimoire</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: #000;
      color: #fff;
      font-family: 'Montserrat', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 80% 60% at 50% 50%, rgba(124, 58, 237, 0.15) 0%, rgba(88, 28, 135, 0.08) 40%, transparent 70%);
      pointer-events: none;
    }
    .card {
      width: 100%;
      max-width: 440px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(124,58,237,0.4);
      border-radius: 16px;
      padding: 30px 26px;
      box-shadow: 0 0 30px rgba(124,58,237,0.2);
      position: relative;
      z-index: 1;
    }
    h1 { margin: 0 0 8px; font-size: 1.45rem; }
    p { margin: 0 0 16px; color: #b0b0b0; font-size: 0.95rem; }
    input {
      width: 100%;
      padding: 13px 14px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.06);
      color: #fff;
      margin-bottom: 12px;
      font-size: 14px;
      font-family: inherit;
    }
    input:focus { outline: none; border-color: #7C3AED; box-shadow: 0 0 0 2px rgba(124,58,237,0.25); }
    button {
      width: 100%;
      padding: 13px 16px;
      border: 0;
      border-radius: 50px;
      background: #7C3AED;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      font-size: 15px;
    }
    button:hover { background: #6d28d9; }
    .msg { margin-top: 12px; font-size: 13px; padding: 8px 10px; border-radius: 8px; display: none; }
    .msg.error { display: block; background: rgba(239,68,68,0.2); color: #fca5a5; }
    .msg.success { display: block; background: rgba(34,197,94,0.2); color: #86efac; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Create a new password</h1>
    <p>Set a new password for your ToolGrimoire account.</p>
    <form id="reset-form">
      <input id="new-password" type="password" placeholder="New password" autocomplete="new-password" required />
      <input id="confirm-password" type="password" placeholder="Confirm new password" autocomplete="new-password" required />
      <button type="submit">Update password</button>
    </form>
    <div id="msg" class="msg"></div>
  </div>

  <script type="module">
    const SUPABASE_URL = 'https://vplpcitffpwsjdczsvnz.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZwbHBjaXRmZnB3c2pkY3pzdm56Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyOTY3OTgsImV4cCI6MjA4ODg3Mjc5OH0.zDMczh4NMUzakcSkqr4ZT72RSqdmv3IzScf30iVZKbY';
    const { createClient } = await import('https://esm.sh/@supabase/supabase-js@2');
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const msgEl = document.getElementById('msg');
    function setMsg(text, isError) {
      msgEl.textContent = text || '';
      msgEl.className = 'msg ' + (text ? (isError ? 'error' : 'success') : '');
    }

    async function initSessionFromLink() {
      const search = new URLSearchParams(window.location.search);
      const code = search.get('code');
      const tokenHash = search.get('token_hash');
      const type = search.get('type');
      if (code) {
        const { error } = await supabase.auth.exchangeCodeForSession(code);
        if (error) throw error;
      } else if (tokenHash && type === 'recovery') {
        const { error } = await supabase.auth.verifyOtp({
          type: 'recovery',
          token_hash: tokenHash,
        });
        if (error) throw error;
      } else {
        const hash = new URLSearchParams((window.location.hash || '').replace(/^#/, ''));
        const access_token = hash.get('access_token') || search.get('access_token');
        const refresh_token = hash.get('refresh_token') || search.get('refresh_token');
        const hashToken = hash.get('token_hash');
        const hashType = hash.get('type');
        if (hashToken && hashType === 'recovery') {
          const { error } = await supabase.auth.verifyOtp({
            type: 'recovery',
            token_hash: hashToken,
          });
          if (error) throw error;
        }
        if (access_token && refresh_token) {
          const { error } = await supabase.auth.setSession({ access_token, refresh_token });
          if (error) throw error;
        }
      }
      const { data: { session } } = await supabase.auth.getSession();
      if (!session) throw new Error('Auth session missing!');
      window.history.replaceState(null, '', window.location.pathname);
    }

    try {
      await initSessionFromLink();
    } catch (e) {
      setMsg('Invalid or expired reset link. Request a new one.', true);
    }

    document.getElementById('reset-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      const p1 = document.getElementById('new-password').value;
      const p2 = document.getElementById('confirm-password').value;
      if (p1.length < 8) return setMsg('Password must be at least 8 characters.', true);
      if (p1 !== p2) return setMsg('Passwords do not match.', true);
      try {
        const { error } = await supabase.auth.updateUser({ password: p1 });
        if (error) throw error;
        setMsg('Password updated. Redirecting to Log In...', false);
        setTimeout(() => { window.location.href = '/?auth=1'; }, 1200);
      } catch (err) {
        setMsg(err.message || 'Could not update password.', true);
      }
    });
  </script>
</body>
</html>
